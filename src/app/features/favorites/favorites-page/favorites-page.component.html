<section class="favorites-page">
  <p *ngIf="favoritePhotos.length === 0" class="empty-message">
    You have not added any favorite photos yet.
  </p>

  <div class="favorites-grid" *ngIf="favoritePhotos.length > 0">
    <app-photo-card
      *ngFor="let photo of favoritePhotos"
      [photo]="photo"
      (photoClick)="openPhoto($event)">
    </app-photo-card>
  </div>
</section>
