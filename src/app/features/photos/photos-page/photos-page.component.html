<section class="photos-page">
  <h1>Photos</h1>

  <div class="photos-grid">
    <app-photo-card
      *ngFor="let photo of photos"
      [photo]="photo"
      (photoClick)="addToFavorites($event)">
    </app-photo-card>
  </div>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>
</section>
