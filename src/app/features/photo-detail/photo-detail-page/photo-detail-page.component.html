<section class="photo-detail-page" *ngIf="photo">
  <div class="photo-wrapper">
  <img [src]="photo.detailUrl || photo.url" [alt]="photo.id">

    <button
      mat-raised-button
      color="warn"
      type="button"
      (click)="removeFromFavorites()">
      Remove from favorites
    </button>
  </div>
</section>
